name: Modern Multi-stage Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        run: python -m unittest test_main.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Artifact
        run: echo "Build version ${{ github.run_number }}" > release.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: release.txt

  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary
      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging середовище..."
          cat release.txt
