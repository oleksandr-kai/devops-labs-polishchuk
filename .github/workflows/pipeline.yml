name: Modern Multi-stage Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        [cite_start]run: python -m unittest test_main.py # Твій тест з минулої лаби 

  build:
    [cite_start]needs: test # Виконається тільки після успішних тестів 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Artifact
        [cite_start]run: echo "Build version ${{ github.run_number }}" > release.txt # Імітація білда 
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: release.txt
