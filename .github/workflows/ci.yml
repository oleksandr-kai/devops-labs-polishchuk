name: Python CI

on:
  pull_request:
    [cite_start]branches: [ "main" ] [cite: 69]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      [cite_start]run: pip install flake8 bandit [cite: 72, 73]

    - name: Run Linting (flake8)
      run: flake8 . [cite_start]--count --select=E9,F63,F7,F82 --show-source --statistics [cite: 72]

    - name: Static Analysis (Bandit)
      [cite_start]run: bandit -r . [cite: 73]

    - name: Run unit tests
      [cite_start]run: python -m unittest test_main.py [cite: 70]
